<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KanjiMate</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

</head>


<body>


<div class="app">


<!-- 홈 화면 -->

<section id="home" class="page">


<header>

<h1>🐱 KanjiMate</h1>

<p>JLPT N3 한자 마스터</p>

</header>



<section class="profile">


<div>
⭐ Lv.<span id="level">1</span>
</div>


<div>
EXP <span id="exp">0</span>/100
</div>


<div>
📚 <span id="learnedCount">0</span>/200
</div>


</section>




<section class="daily">


<h2>오늘의 목표</h2>


<p>
신규 한자 5개 학습
</p>


<div class="progress">

<div id="progressBar"></div>

</div>


</section>






<section class="study-card">


<h2>오늘의 한자</h2>



<div class="kanji">


<h1 id="kanji">
学
</h1>



<h2 id="meaning">
배우다
</h2>



<p>
음독 :
<span id="onyomi">
がく
</span>
</p>



<p>
훈독 :
<span id="kunyomi">
まなぶ
</span>
</p>



<h3>
단어
</h3>


<p id="words">
学校（がっこう） 학생
</p>



<p id="example">

</p>


</div>





<div class="buttons">


<button onclick="remember(true)">
😎 알고 있어요
</button>



<button onclick="remember(false)">
😵 다시 보기
</button>


</div>





<button class="next" onclick="nextKanji()">

다음 한자 →

</button>



</section>






<section class="collection">


<h2>
📖 나의 한자 도감
</h2>



<div id="book">

아직 학습한 한자가 없습니다.

</div>


</section>


</section>









<!-- 학습 화면 -->

<section id="study" class="page" style="display:none;">


<h1>📚 학습</h1>


<p>
200개의 JLPT N3 한자를 학습합니다.
</p>


<div id="studyList">

한자 목록 준비중

</div>


</section>








<!-- 퀴즈 화면 -->

<section id="quiz" class="page" style="display:none;">


<h1>⚔️ 퀴즈</h1>


<p>
한자 뜻 맞추기 퀴즈 준비중
</p>


<button>
퀴즈 시작
</button>


</section>









<!-- 성장 화면 -->

<section id="growth" class="page" style="display:none;">


<h1>🌱 성장</h1>


<h2>
나의 학습 기록
</h2>


<p>
현재 레벨 :
<span id="growthLevel">
1
</span>
</p>


<p>
총 EXP :
<span id="growthExp">
0
</span>
</p>


</section>








<!-- 하단 메뉴 -->


<nav class="bottom-nav">


<button data-page="home">

🏠

<span>
홈
</span>

</button>



<button data-page="study">

📚

<span>
학습
</span>

</button>



<button data-page="quiz">

⚔️

<span>
퀴즈
</span>

</button>



<button data-page="growth">

🌱

<span>
성장
</span>

</button>


</nav>






</div>






<!-- 데이터 -->

<script src="data/n3_kanji.js"></script>


<!-- 기능 -->

<script src="script.js"></script>



</body>

</html>
